<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GIF + Audio Player</title>
</head>
<body>
  <h2>Upload Combined GIF+Audio File</h2>
  <input type="file" id="fileInput" accept=".gifa,.gif" />
  <br><br>
  <img id="gifPlayer" />
  <br>
  <audio id="audioPlayer" controls></audio>

  <!-- Pako library for compression/decompression -->
  <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
  
  <!-- Link to the external script -->
  <script src="player.js"></script>
</body>
</html>
